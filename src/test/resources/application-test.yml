spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AZURE_OPENID_CONFIG_ISSUER}
          audiences:
            - ${AZURE_APP_CLIENT_ID}
            - api://${AZURE_APP_CLIENT_ID}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    database-platform: org.hibernate.dialect.OracleDialect
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:oracle:thin:@///test
    username: test
    password: test
  sql:
    init:
      platform: oracle
      mode: always
      continue-on-error: true

